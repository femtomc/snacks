# ============================================================================
# TMUX Configuration for CLI Agents (Claude Code, Codex, etc.)
# ============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Enable 256 color support (tmux-256color preferred for modern tmux)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc"
# tmux 3.5a expects clipboard data in %p1 for Ms. Hardcode the clipboard target.
set -as terminal-overrides ',xterm-ghostty:Ms=\E]52;c;%p1%s\007'
set -as terminal-overrides ',tmux-256color:Ms=\E]52;c;%p1%s\007'

# Enable sixel graphics passthrough for image viewing (chafa, etc.)
set -ga terminal-features ",xterm-256color:sixel"

# Increase scrollback buffer size (important for reviewing agent output)
set -g history-limit 50000

# Reduce escape time (10ms recommended for CLI tools like Claude Code)
set -sg escape-time 10

# Enable mouse support (useful for scrolling through long agent outputs)
set -g mouse on

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Allow longer session names and window names
set -g status-left-length 40
set -g status-right-length 100

# Update status bar more frequently
set -g status-interval 5

# Enable focus events (helpful for editors)
set -g focus-events on

# Enable extended keys (needed for modified Enter, etc.)
set -g extended-keys on
set -g extended-keys-format csi-u

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------

# Change prefix to Ctrl-a (easier to type than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better split pane bindings (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane switching
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Smooth mouse scrolling (1 line per wheel tick instead of default 5)
# Root binding: enter copy mode AND scroll on the first tick (no dead first event)
bind -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e ; send-keys -X -N 1 scroll-up }
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# Copy mode (vi-style)
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-selection-and-cancel
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-selection-and-cancel
bind ] paste-buffer

# Search up in copy mode (useful for finding agent output)
bind / copy-mode \; send-key ?

# -----------------------------------------------------------------------------
# Visual Settings
# -----------------------------------------------------------------------------

# Pane borders
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour33

# Status bar
set -g status-style bg=colour234,fg=colour137
set -g status-left '#[fg=colour233,bg=colour245,bold] #S #[default] '
set -g status-right '#[fg=colour233,bg=colour241,bold] %Y-%m-%d #[fg=colour233,bg=colour245,bold] %H:%M:%S '

# Window status
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# Message text
set -g message-style bg=colour235,fg=colour166

# -----------------------------------------------------------------------------
# Agent-Specific Optimizations
# -----------------------------------------------------------------------------

# Aggressive resize (useful when multiple people/agents access the same session)
setw -g aggressive-resize on

# Allow the terminal to set window titles automatically
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# Increase message display time for important agent notifications
set -g display-time 2000

# Enable clipboard integration (if available)
set -g set-clipboard on

# Allow passthrough so image protocols (e.g. Kitty graphics) work through tmux
# in capable terminals like Ghostty. `on` limits passthrough to visible panes.
set -g allow-passthrough on

# Disable bell passthrough to terminal
set -g bell-action none

# Monitor for activity (helpful to notice when agent completes tasks)
setw -g monitor-activity on
set -g visual-activity off

# detach-on-destroy removed - let tmux detach normally when session destroyed

# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# tmux-sensible removed - settings already explicit above
set -g @plugin 'tmux-plugins/tmux-resurrect'
# tmux-continuum removed - auto-restore causes unexpected behavior
# Note: tmux-copycat removed (deprecated, use tmux's built-in search with prefix + /)

# -----------------------------------------------------------------------------
# Plugin Configuration
# -----------------------------------------------------------------------------

# tmux-resurrect: Save and restore tmux sessions
# Useful for maintaining your agent workspace across restarts
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum removed - was causing auto-restore on startup

# tmux-yank: Enhanced clipboard integration
# Works with system clipboard for copying agent outputs

# Built-in tmux search (prefix + / triggers copy-mode search)
# Use n/N to navigate between matches in copy-mode

# -----------------------------------------------------------------------------
# Initialize TPM (keep this at the very bottom)
# -----------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'

# Explicit OSC 52 support for Ghostty
set -as terminal-features ',xterm-ghostty:clipboard'

# When SSHing from a local tmux session, remote tmux sees tmux-256color.
# Mark it as clipboard-capable so OSC 52 can hop through nested tmux sessions.
set -as terminal-features ',tmux-256color:clipboard'

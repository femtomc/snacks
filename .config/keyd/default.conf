# Mac-like keybindings for COSMIC desktop on Pop!_OS
#
# Makes Super (Meta) act as macOS "Command" key for common app shortcuts,
# while preserving Super+Arrow, Super+Number, etc. for COSMIC window management.
#
# How it works:
#   - Tapping Super alone sends Super (opens COSMIC launcher)
#   - Holding Super + a listed letter key sends Ctrl + that letter
#   - Holding Super + any unlisted key (arrows, numbers, etc.) sends Super + that key
#
# Panic sequence if something goes wrong: Backspace+Escape+Enter

[ids]
*

[main]

# When Super is tapped alone, send Super (for COSMIC launcher/app library).
# When Super is held with another key, activate the mac_cmd layer.
leftmeta = overload(mac_cmd, macro(leftmeta))
rightmeta = overload(mac_cmd, macro(rightmeta))

# The mac_cmd layer inherits Meta (M) as the default modifier.
# Keys NOT explicitly listed here will send Super+<key> as normal,
# preserving COSMIC desktop shortcuts (Super+Arrow for tiling,
# Super+1-9 for workspaces, etc.).
#
# Keys that ARE listed override the default Meta modifier and
# send Ctrl+<key> instead, providing Mac-like app shortcuts.
#
# Physical Shift/Alt held alongside Super are passed through naturally,
# so Super+Shift+Z sends Ctrl+Shift+Z (Redo) automatically.
[mac_cmd:M]

# Clipboard
c = C-c
v = C-v
x = C-x

# Undo / Redo (Super+Shift+Z = Ctrl+Shift+Z automatically via passthrough)
z = C-z

# Select All
a = C-a

# Save
s = C-s

# Close Tab
w = C-w

# Quit App
q = C-q

# New Tab
t = C-t

# New Window
n = C-n

# Find
f = C-f

# Address Bar (browser)
l = C-l

# Refresh (browser)
r = C-r

# Print
p = C-p

# Bold / Italic / Underline (common in editors)
b = C-b
i = C-i
u = C-u

# Navigation: Super+Left/Right for Home/End (Mac-like line navigation)
# Comment these out if you prefer to keep Super+Arrow for COSMIC tiling.
# left = home
# right = end

# Mac-like keybindings for COSMIC desktop on Pop!_OS
#
# Super acts as a pure modifier (like Command on macOS) — no tap/hold
# ambiguity, no input lag.
#
# Super + listed letter → Ctrl + letter (app shortcuts)
# Super + unlisted key  → Super + key   (COSMIC tiling, workspaces)
#
# Launcher: Ctrl+Space (since Super is now a pure modifier).
# Panic sequence: Backspace+Escape+Enter

[ids]
*

[main]

# Super activates the mac_cmd layer as a pure modifier.
# No overload, no tap detection — instant, like a real Mac.
leftmeta = layer(mac_cmd)
rightmeta = layer(mac_cmd)

# Launcher via Ctrl+Space (replaces bare Super tap)
leftcontrol.space = macro(leftmeta)

# The mac_cmd layer inherits Meta (M) as the default modifier.
# Unmapped keys pass through as Super+<key>, preserving COSMIC
# shortcuts (Super+Arrow for tiling, Super+1-9 for workspaces).
#
# Mapped keys override to Ctrl+<key> for Mac-like app shortcuts.
# Physical Shift/Alt held alongside Super pass through naturally,
# so Super+Shift+Z sends Ctrl+Shift+Z (Redo).
[mac_cmd:M]

# Clipboard
c = C-c
v = C-v
x = C-x

# Undo / Redo
z = C-z

# Select All
a = C-a

# Save
s = C-s

# Close Tab
w = C-w

# Quit App
q = C-q

# New Tab
t = C-t

# New Window
n = C-n

# Find
f = C-f

# Address Bar (browser)
l = C-l

# Refresh (browser)
r = C-r

# Print
p = C-p

# Bold / Italic / Underline
b = C-b
i = C-i
u = C-u

# Mac-like line navigation
left = home
right = end
